<header>
  <div class="header-title">KANBAN</div>
</header>

<div class="container">
  <div class="image-section">
    <div class="kanban-illustration">
      <svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Background -->
        <rect width="300" height="200" fill="none"/>
        
        <!-- Column 1 - To Do -->
        <rect x="10" y="20" width="80" height="160" rx="3" fill="none" stroke="#dcdfe4" stroke-width="1"/>
        <text x="20" y="40" font-size="12" font-weight="600" fill="#172b4d">TO DO</text>
        
        <!-- Card 1 -->
        <rect x="15" y="50" width="70" height="50" rx="2" fill="white" stroke="#dcdfe4" stroke-width="1"/>
        <text x="18" y="65" font-size="11" fill="#172b4d" font-weight="500">Task 1</text>
        <circle cx="22" cy="78" r="3" fill="#0052cc"/>
        <text x="28" y="80" font-size="9" fill="#626f86">Feature</text>
        
        <!-- Card 2 -->
        <rect x="15" y="110" width="70" height="50" rx="2" fill="white" stroke="#dcdfe4" stroke-width="1"/>
        <text x="18" y="125" font-size="11" fill="#172b4d">Task 2</text>
        <circle cx="22" cy="138" r="3" fill="#0052cc"/>
        <text x="28" y="140" font-size="9" fill="#626f86">Bug</text>
        
        <!-- Column 2 - In Progress -->
        <rect x="110" y="20" width="90" height="160" rx="3" fill="none" stroke="#dcdfe4" stroke-width="1"/>
        <text x="120" y="40" font-size="12" font-weight="600" fill="#172b4d">IN PROGRESS</text>
        
        <!-- Card 3 -->
        <rect x="115" y="50" width="70" height="50" rx="2" fill="#f1f2f4" stroke="#0052cc" stroke-width="1.5"/>
        <text x="118" y="65" font-size="11" fill="#172b4d">Task 3</text>
        <circle cx="122" cy="78" r="3" fill="#0052cc"/>
        <text x="128" y="80" font-size="9" fill="#626f86">Feature</text>
        
        <!-- Column 3 - Done -->
        <rect x="220" y="20" width="80" height="160" rx="3" fill="none" stroke="#dcdfe4" stroke-width="1"/>
        <text x="230" y="40" font-size="12" font-weight="600" fill="#172b4d">DONE</text>
        
        <!-- Card 4 -->
        <rect x="225" y="50" width="70" height="50" rx="2" fill="white" stroke="#22875e" stroke-width="1.5"/>
        <text x="228" y="65" font-size="11" fill="#172b4d">Task 4</text>
        <circle cx="232" cy="78" r="3" fill="#22875e"/>
        <text x="238" y="80" font-size="9" fill="#626f86">Done</text>
      </svg>
    </div>
  </div>

  <div class="content-section">
    <h1>Welcome to KANBAN</h1>
    <p class="subtitle">Organize your work and boost productivity</p>
    
    <div class="button-group">
      <button class="btn btn-login" (click)="openLogin()">Sign In</button>
      <button class="btn btn-register" (click)="openRegister()">Create Account</button>
    </div>
  </div>
</div>
