<header>
  <div class="header-title">KANBAN</div>
</header>

<div class="login-container">
  <div class="login-box">
    <h2>Welcome Back</h2>
    <p>Sign in to your Kanban account</p>

    <form [formGroup]="loginForm" (ngSubmit)="handleLogin()">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email"
          class="form-control"
          [class.is-invalid]="submitted && f['email'].errors"
          placeholder="Enter your email">
        <div *ngIf="submitted && f['email'].errors" class="error-message">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Please enter a valid email</div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password"
          class="form-control"
          [class.is-invalid]="submitted && f['password'].errors"
          placeholder="Enter your password">
        <div *ngIf="submitted && f['password'].errors" class="error-message">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
          <div *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</div>
        </div>
      </div>

      <div class="form-options">
        <label>
          <input type="checkbox" formControlName="rememberMe"> Remember me
        </label>
        <a href="#" class="forgot-password">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-login-submit">Sign In</button>
    </form>

    <div class="form-footer">
      <p>Don't have an account? <a (click)="navigateToRegister()" class="link">Create one</a></p>
      <a (click)="goHome()" class="back-link">Back to Home</a>
    </div>
  </div>
</div>
